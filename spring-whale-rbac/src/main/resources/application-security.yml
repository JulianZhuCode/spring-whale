# RBAC Security 配置
rbac:
  security:
    # 允许匿名访问的接口路径列表（支持 Ant 风格）
    permit-all-urls:
      - /api/rbac/auth/**
      - /api/rbac/public/**
      # 其他模块可以在此添加自己的公开接口
      # - /api/custom/public/**
    
    # 是否启用 CSRF 保护（JWT 场景下通常不需要）
    csrf-enabled: false
    
    # 是否启用 CORS 跨域支持
    cors-enabled: true
    
    # JWT Token 前缀
    token-prefix: "Bearer "
    
    # JWT Token Header 名称
    token-header: "Authorization"

# JWT 配置
jwt:
  # JWT 密钥（生产环境应该使用环境变量）
  secret: SpringWhaleRBACSecretKey2024ForJWTTokenGenerationMustBeLongEnough
  # Token 过期时间（毫秒），默认24小时
  expiration: 86400000
