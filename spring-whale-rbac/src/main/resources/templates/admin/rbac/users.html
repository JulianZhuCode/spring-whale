<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title>Users</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title='Users',
        description='Manage system users',
        createUrl='#',
        createModal='user-modal',
        createPermission='rbac:user:create',
        items=${users},
        emptyMessage='No users found',
        baseUrl='/admin/rbac/users',
        page=${page},
        colspan=8,
        headers=~{::#user-headers},
        rows=~{::#user-row}
    )}">
        <th:block id="user-headers">
            <th>ID</th>
            <th>Username</th>
            <th>Real Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Group</th>
            <th>Status</th>
            <th>Actions</th>
        </th:block>
        <th:block id="user-row">
            <td th:text="${item.id}">1</td>
            <td th:text="${item.username}">admin</td>
            <td th:text="${item.realName}">Admin</td>
            <td th:text="${item.email}">admin@example.com</td>
            <td th:text="${item.phone}">13800138000</td>
            <td th:text="${item.groupName} ?: '-'">Root Group</td>
            <td>
                <span th:if="${item.status == 1}" class="badge badge-success">Active</span>
                <span th:if="${item.status == 0}" class="badge badge-danger">Disabled</span>
            </td>
            <td class="flex-gap">
                <button th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:user:update')}"
                        data-modal="user-modal" th:attr="data-edit-id=${item.id}" class="btn btn-outline btn-sm">Edit</button>
            </td>
        </th:block>
    </th:block>

    <!-- User Modal -->
    <div id="user-modal" class="dict-modal-overlay hidden">
        <div class="modal-dialog">
            <div class="modal-header">
                <h2 class="modal-title">Create User</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form class="dict-modal-form" data-api-base="/api/rbac/users">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label" for="user-username">Username</label>
                        <input type="text" id="user-username" name="username" class="form-control" required>
                        <div class="form-error" data-field="username"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="user-password">Password</label>
                        <input type="password" id="user-password" name="password" class="form-control">
                        <div class="form-error" data-field="password"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="user-realName">Real Name</label>
                        <input type="text" id="user-realName" name="realName" class="form-control">
                        <div class="form-error" data-field="realName"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="user-email">Email</label>
                        <input type="email" id="user-email" name="email" class="form-control">
                        <div class="form-error" data-field="email"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="user-phone">Phone</label>
                        <input type="text" id="user-phone" name="phone" class="form-control">
                        <div class="form-error" data-field="phone"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="user-groupId">Group</label>
                        <select id="user-groupId" name="groupId" class="form-control">
                            <option value="">-- Select --</option>
                        </select>
                        <div class="form-error" data-field="groupId"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="user-status">Status</label>
                        <select id="user-status" name="status" class="form-control">
                            <option value="1">Active</option>
                            <option value="0">Disabled</option>
                        </select>
                        <div class="form-error" data-field="status"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary modal-cancel">Cancel</button>
                    <button type="button" class="btn btn-primary modal-submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
