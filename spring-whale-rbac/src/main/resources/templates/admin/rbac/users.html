<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title>Users</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title='Users',
        description='Manage system users',
        createUrl='/admin/rbac/users/create',
        items=${users},
        emptyMessage='No users found',
        baseUrl='/admin/rbac/users',
        page=${page},
        colspan=7,
        headers=~{::#user-headers},
        rows=~{::#user-row}
    )}">
        <th:block id="user-headers">
            <th>ID</th>
            <th>Username</th>
            <th>Real Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Actions</th>
        </th:block>
        <th:block id="user-row">
            <td th:text="${item.id}">1</td>
            <td th:text="${item.username}">admin</td>
            <td th:text="${item.realName}">Admin</td>
            <td th:text="${item.email}">admin@example.com</td>
            <td th:text="${item.phone}">13800138000</td>
            <td>
                <span th:if="${item.status == 1}" class="badge badge-success">Active</span>
                <span th:if="${item.status == 0}" class="badge badge-danger">Disabled</span>
            </td>
            <td class="flex-gap">
                <a th:href="@{/admin/rbac/users/{id}(id=${item.id})}" class="btn btn-secondary btn-sm">View</a>
                <a th:href="@{/admin/rbac/users/{id}/edit(id=${item.id})}" class="btn btn-primary btn-sm">Edit</a>
            </td>
        </th:block>
    </th:block>
</main>

</body>
</html>
