<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title>Roles</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title='Roles',
        description='Manage system roles',
        createUrl='/admin/rbac/roles/create',
        createPermission='rbac:role:create',
        items=${roles},
        emptyMessage='No roles found',
        baseUrl='/admin/rbac/roles',
        page=${page},
        colspan=8,
        headers=~{::#role-headers},
        rows=~{::#role-row}
    )}">
        <th:block id="role-headers">
            <th>ID</th>
            <th>Code</th>
            <th>Name</th>
            <th>Description</th>
            <th>Group</th>
            <th>Sort</th>
            <th>Status</th>
            <th>Actions</th>
        </th:block>
        <th:block id="role-row">
            <td th:text="${item.id}">1</td>
            <td><code th:text="${item.code}">ROLE_ADMIN</code></td>
            <td th:text="${item.name}">Admin</td>
            <td th:text="${item.description}">Administrator role</td>
            <td th:text="${item.groupName} ?: '-'">Root Group</td>
            <td th:text="${item.sort}">1</td>
            <td>
                <span th:if="${item.status == 1}" class="badge badge-success">Active</span>
                <span th:if="${item.status == 0}" class="badge badge-danger">Disabled</span>
            </td>
            <td class="flex-gap">
                <a th:href="@{/admin/rbac/roles/{id}(id=${item.id})}" class="btn btn-secondary btn-sm">View</a>
                <a th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:role:update')}"
                   th:href="@{/admin/rbac/roles/{id}/edit(id=${item.id})}" class="btn btn-primary btn-sm">Edit</a>
            </td>
        </th:block>
    </th:block>
</main>

</body>
</html>
