<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title>Roles</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title='Roles',
        description='Manage system roles',
        createUrl='#',
        createModal='role-modal',
        createPermission='rbac:role:create',
        items=${roles},
        emptyMessage='No roles found',
        baseUrl='/admin/rbac/roles',
        page=${page},
        colspan=8,
        headers=~{::#role-headers},
        rows=~{::#role-row}
    )}">
        <th:block id="role-headers">
            <th>ID</th>
            <th>Code</th>
            <th>Name</th>
            <th>Description</th>
            <th>Group</th>
            <th>Sort</th>
            <th>Status</th>
            <th>Actions</th>
        </th:block>
        <th:block id="role-row">
            <td th:text="${item.id}">1</td>
            <td><code th:text="${item.code}">ROLE_ADMIN</code></td>
            <td th:text="${item.name}">Admin</td>
            <td th:text="${item.description}">Administrator role</td>
            <td th:text="${item.groupName} ?: '-'">Root Group</td>
            <td th:text="${item.sort}">1</td>
            <td>
                <span th:if="${item.status == 1}" class="badge badge-success">Active</span>
                <span th:if="${item.status == 0}" class="badge badge-danger">Disabled</span>
            </td>
            <td class="flex-gap">
                <button th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:role:update')}"
                        data-modal="role-modal" th:attr="data-edit-id=${item.id}" class="btn btn-primary btn-sm">Edit</button>
            </td>
        </th:block>
    </th:block>

    <!-- Role Modal -->
    <div id="role-modal" class="dict-modal-overlay hidden">
        <div class="modal-dialog">
            <div class="modal-header">
                <h2 class="modal-title">Create Role</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form class="dict-modal-form" data-api-base="/api/rbac/roles">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label" for="role-code">Code</label>
                        <input type="text" id="role-code" name="code" class="form-control" required>
                        <div class="form-error" data-field="code"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="role-name">Name</label>
                        <input type="text" id="role-name" name="name" class="form-control" required>
                        <div class="form-error" data-field="name"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="role-description">Description</label>
                        <input type="text" id="role-description" name="description" class="form-control">
                        <div class="form-error" data-field="description"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="role-groupId">Group</label>
                        <select id="role-groupId" name="groupId" class="form-control">
                            <option value="">-- Select --</option>
                        </select>
                        <div class="form-error" data-field="groupId"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="role-sort">Sort</label>
                        <input type="number" id="role-sort" name="sort" class="form-control">
                        <div class="form-error" data-field="sort"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="role-status">Status</label>
                        <select id="role-status" name="status" class="form-control">
                            <option value="1">Active</option>
                            <option value="0">Disabled</option>
                        </select>
                        <div class="form-error" data-field="status"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary modal-cancel">Cancel</button>
                    <button type="button" class="btn btn-primary modal-submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
