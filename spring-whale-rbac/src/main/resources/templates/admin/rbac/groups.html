<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title>Groups</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title='Groups',
        description='Manage organizational groups and departments',
        createUrl='#',
        createModal='group-modal',
        createPermission='rbac:group:create',
        items=${groups},
        emptyMessage='No groups found',
        baseUrl='/admin/rbac/groups',
        page=${page},
        colspan=8,
        headers=~{::#group-headers},
        rows=~{::#group-row}
    )}">
        <th:block id="group-headers">
            <th>ID</th>
            <th>Code</th>
            <th>Name</th>
            <th>Description</th>
            <th>Leader</th>
            <th>Sort</th>
            <th>Status</th>
            <th>Actions</th>
        </th:block>
        <th:block id="group-row">
            <td th:text="${item.id}">1</td>
            <td><code th:text="${item.code}">IT</code></td>
            <td th:text="${item.name}">IT Dept</td>
            <td th:text="${item.description}">IT Department</td>
            <td th:text="${item.leader}">John</td>
            <td th:text="${item.sort}">1</td>
            <td>
                <span th:if="${item.status == 1}" class="badge badge-success">Active</span>
                <span th:if="${item.status == 0}" class="badge badge-danger">Disabled</span>
            </td>
            <td class="flex-gap">
                <button th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:group:update')}"
                        data-modal="group-modal" th:attr="data-edit-id=${item.id}" class="btn btn-outline btn-sm">Edit</button>
            </td>
        </th:block>
    </th:block>

    <!-- Group Modal -->
    <div id="group-modal" class="dict-modal-overlay hidden">
        <div class="modal-dialog">
            <div class="modal-header">
                <h2 class="modal-title">Create Group</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form class="dict-modal-form" data-api-base="/api/rbac/groups">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label" for="group-parentId">Parent ID</label>
                        <input type="number" id="group-parentId" name="parentId" class="form-control">
                        <div class="form-error" data-field="parentId"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="group-code">Code</label>
                        <input type="text" id="group-code" name="code" class="form-control" required>
                        <div class="form-error" data-field="code"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="group-name">Name</label>
                        <input type="text" id="group-name" name="name" class="form-control" required>
                        <div class="form-error" data-field="name"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="group-description">Description</label>
                        <input type="text" id="group-description" name="description" class="form-control">
                        <div class="form-error" data-field="description"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="group-leader">Leader</label>
                        <input type="text" id="group-leader" name="leader" class="form-control">
                        <div class="form-error" data-field="leader"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="group-phone">Phone</label>
                        <input type="text" id="group-phone" name="phone" class="form-control">
                        <div class="form-error" data-field="phone"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="group-email">Email</label>
                        <input type="email" id="group-email" name="email" class="form-control">
                        <div class="form-error" data-field="email"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="group-sort">Sort</label>
                        <input type="number" id="group-sort" name="sort" class="form-control">
                        <div class="form-error" data-field="sort"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="group-status">Status</label>
                        <select id="group-status" name="status" class="form-control">
                            <option value="1">Active</option>
                            <option value="0">Disabled</option>
                        </select>
                        <div class="form-error" data-field="status"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary modal-cancel">Cancel</button>
                    <button type="button" class="btn btn-primary modal-submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
