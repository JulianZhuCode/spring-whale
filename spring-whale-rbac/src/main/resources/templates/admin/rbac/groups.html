<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title>Groups</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title='Groups',
        description='Manage organizational groups and departments',
        createUrl='/admin/rbac/groups/create',
        items=${groups},
        emptyMessage='No groups found',
        baseUrl='/admin/rbac/groups',
        page=${page},
        colspan=8,
        headers=~{::#group-headers},
        rows=~{::#group-row}
    )}">
        <th:block id="group-headers">
            <th>ID</th>
            <th>Code</th>
            <th>Name</th>
            <th>Description</th>
            <th>Leader</th>
            <th>Sort</th>
            <th>Status</th>
            <th>Actions</th>
        </th:block>
        <th:block id="group-row">
            <td th:text="${item.id}">1</td>
            <td><code th:text="${item.code}">IT</code></td>
            <td th:text="${item.name}">IT Dept</td>
            <td th:text="${item.description}">IT Department</td>
            <td th:text="${item.leader}">John</td>
            <td th:text="${item.sort}">1</td>
            <td>
                <span th:if="${item.status == 1}" class="badge badge-success">Active</span>
                <span th:if="${item.status == 0}" class="badge badge-danger">Disabled</span>
            </td>
            <td class="flex-gap">
                <a th:href="@{/admin/rbac/groups/{id}(id=${item.id})}" class="btn btn-secondary btn-sm">View</a>
                <a th:href="@{/admin/rbac/groups/{id}/edit(id=${item.id})}" class="btn btn-primary btn-sm">Edit</a>
            </td>
        </th:block>
    </th:block>
</main>

</body>
</html>
