<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title>Menus</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title='Menus',
        description='Manage system menus and permissions',
        createUrl='/admin/rbac/menus/create',
        createPermission='rbac:menu:create',
        items=${menus},
        emptyMessage='No menus found',
        baseUrl='/admin/rbac/menus',
        page=${page},
        colspan=9,
        headers=~{::#menu-headers},
        rows=~{::#menu-row}
    )}">
        <th:block id="menu-headers">
            <th>ID</th>
            <th>Code</th>
            <th>Name</th>
            <th>Type</th>
            <th>Path</th>
            <th>Permission</th>
            <th>Sort</th>
            <th>Status</th>
            <th>Actions</th>
        </th:block>
        <th:block id="menu-row">
            <td th:text="${item.id}">1</td>
            <td><code th:text="${item.code}">user:list</code></td>
            <td th:text="${item.name}">Users</td>
            <td>
                <span th:if="${item.type == 1}" class="badge badge-info">Menu</span>
                <span th:if="${item.type == 2}" class="badge badge-warning">Button</span>
                <span th:if="${item.type == 3}" class="badge badge-info">API</span>
            </td>
            <td th:text="${item.path}">/admin/rbac/users</td>
            <td><code th:text="${item.permission}">user:list</code></td>
            <td th:text="${item.sort}">1</td>
            <td>
                <span th:if="${item.status == 1}" class="badge badge-success">Active</span>
                <span th:if="${item.status == 0}" class="badge badge-danger">Disabled</span>
            </td>
            <td class="flex-gap">
                <a th:href="@{/admin/rbac/menus/{id}(id=${item.id})}" class="btn btn-secondary btn-sm">View</a>
                <a th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:menu:update')}"
                   th:href="@{/admin/rbac/menus/{id}/edit(id=${item.id})}" class="btn btn-primary btn-sm">Edit</a>
            </td>
        </th:block>
    </th:block>
</main>

</body>
</html>
