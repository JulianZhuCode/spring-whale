<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="table(title,description,createUrl,createPermission,items,emptyMessage,baseUrl,page,colspan,headers,rows)">
    <div class="page-header card mb-4">
        <div class="card-body d-flex align-items-start justify-content-between gap-3">
            <div>
                <h1 class="mb-1" th:text="${title}">Title</h1>
                <p class="text-secondary mb-0" th:text="${description}">Description</p>
            </div>
            <a th:if="${createUrl != null and (createPermission == null or #sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, createPermission))}"
               th:unless="${createModal != null}"
               th:href="@{${createUrl}}"
               class="btn btn-primary btn-new shadow-sm">+ New</a>
            <button th:if="${createUrl != null and createModal != null and (createPermission == null or #sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, createPermission))}"
                    th:attr="data-modal=${createModal}"
                    class="btn btn-primary btn-new shadow-sm">+ New</button>
        </div>
    </div>

    <div class="table-wrapper card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr><th:block th:replace="${headers}"></th:block></tr>
                </thead>
                <tbody>
                    <th:block th:each="item : ${items}">
                        <tr><th:block th:replace="${rows}"></th:block></tr>
                    </th:block>
                    <tr th:if="${items == null or #lists.isEmpty(items)}">
                        <td th:attr="colspan=${colspan}" class="text-center text-muted py-5" th:text="${emptyMessage}">No data found</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <th:block th:replace="~{admin/fragments/data-table :: pagination(baseUrl=${baseUrl}, page=${page})}"></th:block>
    </div>
</th:block>

<th:block th:fragment="pagination(baseUrl,page)">
    <div th:if="${page != null and page.totalPages > 1}" class="d-flex justify-content-center pt-3 pb-2">
        <th:block th:with="current=${page.number}, total=${page.totalPages}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a th:if="${!page.first}" th:href="@{${baseUrl}(page=${current - 1})}" class="page-link">Prev</a>
                    <span th:if="${page.first}" class="page-link">Prev</span>
                </li>
                <th:block th:each="i : ${#numbers.sequence(0, total - 1)}">
                    <li class="page-item" th:classappend="${i == current} ? 'active'">
                        <a class="page-link" th:href="@{${baseUrl}(page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                </th:block>
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a th:if="${!page.last}" th:href="@{${baseUrl}(page=${current + 1})}" class="page-link">Next</a>
                    <span th:if="${page.last}" class="page-link">Next</span>
                </li>
            </ul>
        </th:block>
    </div>
</th:block>

</body>
</html>
