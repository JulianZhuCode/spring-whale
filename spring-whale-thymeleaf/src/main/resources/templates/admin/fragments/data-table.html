<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block
        th:fragment="table(title,description,createUrl,createPermission,items,emptyMessage,baseUrl,page,colspan,headers,rows)">
    <div class="page-header card mb-4">
        <div class="card-body d-flex align-items-start justify-content-between gap-3">
            <div>
                <h1 class="mb-1" th:text="${title}">Title</h1>
                <p class="text-secondary mb-0" th:text="${description}">Description</p>
            </div>
            <a class="btn btn-primary btn-new shadow-sm"
               th:href="@{${createUrl}}"
               th:if="${createUrl != null and (createPermission == null or #sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, createPermission))}"
               th:text="#{table.new}" th:unless="${createModal != null}">+ New</a>
            <button class="btn btn-primary btn-new shadow-sm"
                    th:attr="data-modal=${createModal}"
                    th:if="${createUrl != null and createModal != null and (createPermission == null or #sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, createPermission))}"
                    th:text="#{table.new}">+ New
            </button>
        </div>
    </div>

    <div class="table-wrapper card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th:block th:replace="${headers}"></th:block>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="item : ${items}">
                    <tr>
                        <th:block th:replace="${rows}"></th:block>
                    </tr>
                </th:block>
                <tr th:if="${items == null or #lists.isEmpty(items)}">
                    <td class="text-center text-muted py-5" th:attr="colspan=${colspan}" th:text="${emptyMessage}">No
                        data found
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <th:block th:replace="~{admin/fragments/data-table :: pagination(baseUrl=${baseUrl}, page=${page})}"></th:block>
    </div>
</th:block>

<th:block th:fragment="pagination(baseUrl,page)">
    <div class="d-flex justify-content-center pt-3 pb-2" th:if="${page != null and page.totalPages > 1}">
        <th:block th:with="current=${page.number}, total=${page.totalPages}, half=4,
                           start=${(total <= 9) ? 0 : ((current - half) < 0 ? 0 : ((current + half) >= total ? (total - 9) : (current - half)))},
                           end=${(total <= 9) ? (total - 1) : (start + 8)}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link" th:href="@{${baseUrl}(page=${current - 1})}" th:if="${!page.first}"
                       th:text="#{table.pagination.prev}">Prev</a>
                    <span class="page-link" th:if="${page.first}" th:text="#{table.pagination.prev}">Prev</span>
                </li>

                <li class="page-item" th:if="${start > 0}">
                    <a class="page-link" th:href="@{${baseUrl}(page=0)}">1</a>
                </li>
                <li class="page-item disabled" th:if="${start > 1}">
                    <span class="page-link">...</span>
                </li>

                <th:block th:each="i : ${#numbers.sequence(start, end)}">
                    <li class="page-item" th:classappend="${i == current} ? 'active'">
                        <a class="page-link" th:href="@{${baseUrl}(page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                </th:block>

                <li class="page-item disabled" th:if="${end < total - 2}">
                    <span class="page-link">...</span>
                </li>
                <li class="page-item" th:if="${end < total - 1}">
                    <a class="page-link" th:href="@{${baseUrl}(page=${total - 1})}" th:text="${total}">1</a>
                </li>

                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link" th:href="@{${baseUrl}(page=${current + 1})}" th:if="${!page.last}"
                       th:text="#{table.pagination.next}">Next</a>
                    <span class="page-link" th:if="${page.last}" th:text="#{table.pagination.next}">Next</span>
                </li>
            </ul>
        </th:block>
    </div>
</th:block>

</body>
</html>
