<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="sidebar">

    <nav class="sidebar-nav d-flex flex-column h-100">

        <div class="sidebar-brand">
            <a class="sidebar-brand-link" th:href="@{/admin}">
                <span class="sidebar-brand-icon">&#x1F40B;</span>
                <span class="sidebar-brand-text">SW Admin</span>
            </a>
        </div>

        <!-- Dashboard -->
        <a class="sidebar-dashboard-link"
           th:classappend="${currentPath == '/admin'} ? 'active'"
           th:href="@{/admin}">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
        </a>

        <hr class="sidebar-divider">

        <!-- Module Groups -->
        <ul class="sidebar-menu flex-grow-1">
            <th:block th:each="group : ${menuGroups}">
                <li class="sidebar-menu-group">
                    <div class="sidebar-menu-group-header" th:attr="data-group=${group.key}">
                        <span class="menu-icon" th:if="${group.icon}" th:text="${group.icon}"></span>
                        <span class="menu-icon" th:unless="${group.icon}"><i class="bi bi-folder"></i></span>
                        <span class="menu-label" th:text="${group.label}">Group</span>
                        <i class="bi bi-chevron-down menu-arrow ms-auto"></i>
                    </div>
                    <ul class="sidebar-menu-children">
                        <th:block th:each="child : ${group.children}">
                            <li class="sidebar-menu-item">
                                <a th:classappend="${currentPath == child.url} ? 'active' : ''"
                                   th:href="@{${child.url}}"
                                   th:text="${child.label}">Item</a>
                            </li>
                        </th:block>
                    </ul>
                </li>
            </th:block>
        </ul>
    </nav>
</th:block>

</body>
</html>
