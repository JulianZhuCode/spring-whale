<!DOCTYPE html>
<html th:lang="${#locale.language}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE" th:text="${adminProps.brandName + ' Admin'}">
        Admin</title>
    <link rel="icon" th:href="@{/admin/favicon.svg}" type="image/svg+xml">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
</head>
<body class="admin-body">

<div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar" th:replace="~{admin/fragments/sidebar :: sidebar}"></aside>

    <!-- Main Content Area -->
    <div class="admin-main">
        <!-- Header -->
        <header class="admin-header" th:insert="~{admin/fragments/header :: header}"></header>

        <!-- Page Content -->
        <main class="admin-content" layout:fragment="content">
            <!-- Child templates inject their content here -->
        </main>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/admin/js/admin.js}"></script>
</body>
</html>
