<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title th:text="#{dashboard.title}">Dashboard</title>
</head>

<body>

<main layout:fragment="content">
    <div class="page-header">
        <h1 th:text="#{dashboard.title}">Dashboard</h1>
        <p class="text-secondary" th:text="#{dashboard.welcome(${adminProps.brandName})}">Welcome to Admin Console</p>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card stat-card-primary text-white border-0">
                <div class="card-body">
                    <div class="stat-card-label" th:text="#{dashboard.status}">Status</div>
                    <div class="stat-card-value" th:text="#{dashboard.online}">Online</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card border-0 shadow-sm">
                <div class="card-body">
                    <div class="stat-card-label" th:text="#{dashboard.modules}">Modules</div>
                    <div class="stat-card-value" th:text="${menuGroups.size()}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card border-0 shadow-sm">
                <div class="card-body">
                    <div class="stat-card-label" th:text="#{dashboard.version}">Version</div>
                    <div class="stat-card-value" th:text="${adminProps.version}">0.0.2</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Module Cards -->
    <th:block th:if="${!menuGroups.isEmpty()}">
        <h2 class="section-title" th:text="#{dashboard.section_modules}">Modules</h2>
        <div class="row g-3">
            <th:block th:each="group : ${menuGroups}">
                <div class="col-lg-4 col-md-6">
                    <div class="card dashboard-card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <div class="dashboard-card-icon" th:if="${group.icon}" th:text="${group.icon}">&#x1F4E6;</div>
                            <h3 class="h6" th:text="${group.label}">Group</h3>
                            <ul class="list-unstyled mb-0">
                                <th:block th:each="child : ${group.children}">
                                    <li class="mb-1"><a th:href="@{${child.url}}" th:text="${child.label}">Item</a></li>
                                </th:block>
                            </ul>
                        </div>
                    </div>
                </div>
            </th:block>
        </div>
    </th:block>

    <!-- Empty State -->
    <div th:if="${menuGroups.isEmpty()}" class="text-center py-5 text-muted">
        <div class="display-1 mb-3">&#x1F3E0;</div>
        <p class="h5 text-secondary mb-2" th:text="#{dashboard.empty_title}">No modules yet</p>
        <p class="small" th:text="#{dashboard.empty_desc}">Add AdminMenuProvider beans to register menu items here.</p>
    </div>
</main>

</body>
</html>
