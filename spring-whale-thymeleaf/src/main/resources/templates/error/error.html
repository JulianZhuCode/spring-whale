<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Error ' + ${status} + ' - Spring Whale Admin'">Error - Spring Whale Admin</title>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
    <style>
        .error-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }
        .error-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .error-card .status-code {
            font-size: 80px;
            font-weight: 800;
            color: #1e293b;
            line-height: 1;
            margin-bottom: 8px;
        }
        .error-card .divider {
            width: 48px;
            height: 4px;
            background: #3b82f6;
            margin: 16px auto;
            border-radius: 2px;
        }
        .error-card p {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .error-card .btn {
            padding: 10px 24px;
            font-size: 14px;
        }
        .error-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="error-page">
    <div class="error-card">
        <div class="status-code" th:text="${status}">404</div>
        <div class="divider"></div>
        <p th:text="${message}">An error occurred.</p>
        <a href="/admin" class="btn btn-primary">Back to Dashboard</a>
        <p class="error-footer">&copy; 2026 Spring Whale Framework</p>
    </div>
</div>

</body>
</html>
