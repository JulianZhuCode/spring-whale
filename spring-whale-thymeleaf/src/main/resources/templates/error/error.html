<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Error ' + ${status} + ' - Spring Whale Admin'">Error - Spring Whale Admin</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
</head>
<body class="bg-light">

<div class="error-page">
    <div class="error-card shadow text-center">
        <div class="status-code" th:text="${status}">404</div>
        <div class="divider"></div>
        <p th:text="${message}">An error occurred.</p>
        <a href="/admin" class="btn btn-primary">Back to Dashboard</a>
        <p class="error-footer">&copy; 2026 Spring Whale Framework</p>
    </div>
</div>

</body>
</html>
