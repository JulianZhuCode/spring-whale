<!DOCTYPE html>
<html layout:decorate="~{admin/layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="#{rbac.roles.title}">Roles</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title=#{rbac.roles.title},
        description=#{rbac.roles.description},
        createUrl='#',
        createModal='role-modal',
        createPermission='rbac:role:create',
        items=${roles},
        emptyMessage=#{rbac.roles.empty},
        baseUrl='/admin/rbac/roles',
        page=${page},
        colspan=8,
        headers=~{::#role-headers},
        rows=~{::#role-row}
    )}">
        <th:block id="role-headers">
            <th>ID</th>
            <th th:text="#{rbac.roles.code}">Code</th>
            <th th:text="#{rbac.roles.name}">Name</th>
            <th th:text="#{rbac.roles.description}">Description</th>
            <th th:text="#{rbac.roles.group}">Group</th>
            <th th:text="#{rbac.roles.sort}">Sort</th>
            <th th:text="#{rbac.roles.status}">Status</th>
            <th th:text="#{rbac.roles.actions}">Actions</th>
        </th:block>
        <th:block id="role-row">
            <td th:text="${item.id}">1</td>
            <td><code th:text="${item.code}">ROLE_ADMIN</code></td>
            <td th:text="${item.name}">Admin</td>
            <td th:text="${item.description}">Administrator role</td>
            <td th:text="${item.groupName} ?: '-'">Root Group</td>
            <td th:text="${item.sort}">1</td>
            <td>
                <span class="badge bg-success" th:if="${item.status == 1}" th:text="#{status.active}">Active</span>
                <span class="badge bg-danger" th:if="${item.status == 0}" th:text="#{status.disabled}">Disabled</span>
            </td>
            <td>
                <button class="btn btn-outline-primary btn-sm"
                        data-modal="role-modal" th:attr="data-edit-id=${item.id}"
                        th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:role:update')}"
                        th:text="#{action.edit}">Edit
                </button>
            </td>
        </th:block>
    </th:block>

    <!-- Role Modal -->
    <div class="modal fade" id="role-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{rbac.roles.create}">Create Role</h5>
                    <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <form class="dict-modal-form" data-api-base="/api/rbac/roles">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label" for="role-code" th:text="#{rbac.roles.code}">Code</label>
                            <input class="form-control" id="role-code" name="code" required type="text">
                            <div class="invalid-feedback" data-field="code"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="role-name" th:text="#{rbac.roles.name}">Name</label>
                            <input class="form-control" id="role-name" name="name" required type="text">
                            <div class="invalid-feedback" data-field="name"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="role-description" th:text="#{rbac.roles.description}">Description</label>
                            <input class="form-control" id="role-description" name="description" type="text">
                            <div class="invalid-feedback" data-field="description"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="role-groupId" th:text="#{rbac.roles.group}">Group</label>
                            <select class="form-select" id="role-groupId" name="groupId">
                                <option th:text="#{rbac.roles.select_group}" value="">-- Select --</option>
                            </select>
                            <div class="invalid-feedback" data-field="groupId"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="role-sort" th:text="#{rbac.roles.sort}">Sort</label>
                            <input class="form-control" id="role-sort" name="sort" type="number">
                            <div class="invalid-feedback" data-field="sort"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="role-status" th:text="#{rbac.roles.status}">Status</label>
                            <select class="form-select" id="role-status" name="status">
                                <option th:text="#{status.active}" value="1">Active</option>
                                <option th:text="#{status.disabled}" value="0">Disabled</option>
                            </select>
                            <div class="invalid-feedback" data-field="status"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{action.cancel}"
                                type="button">Cancel
                        </button>
                        <button class="btn btn-primary modal-submit" th:text="#{action.save}" type="button">Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
