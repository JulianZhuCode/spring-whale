<!DOCTYPE html>
<html layout:decorate="~{admin/layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="#{rbac.menus.title}">Menus</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title=#{rbac.menus.title},
        description=#{rbac.menus.description},
        createUrl='#',
        createModal='menu-modal',
        createPermission='rbac:menu:create',
        items=${menus},
        emptyMessage=#{rbac.menus.empty},
        baseUrl='/admin/rbac/menus',
        page=${page},
        colspan=8,
        headers=~{::#menu-headers},
        rows=~{::#menu-row},
        filter=~{::#menu-filter}
    )}">
        <th:block id="menu-filter">
            <div class="row g-2">
                <div class="col-md-5">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input class="form-control" id="menuSearchInput"
                               th:placeholder="#{rbac.menus.search_placeholder}"
                               th:value="${keyword}" type="text">
                        <button class="btn btn-outline-secondary" id="menuSearchClear" style="display:none"
                                type="button">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="menuTypeFilter">
                        <option value="" th:text="#{rbac.menus.all_types}">All Types</option>
                        <option th:selected="${selectedType != null and selectedType == '1'}" value="1" th:text="#{rbac.menus.type.directory}">Directory</option>
                        <option th:selected="${selectedType != null and selectedType == '2'}" value="2" th:text="#{rbac.menus.type.menu}">Menu</option>
                        <option th:selected="${selectedType != null and selectedType == '3'}" value="3" th:text="#{rbac.menus.type.button}">Button</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="menuStatusFilter">
                        <option value="" th:text="#{rbac.menus.all_status}">All Status</option>
                        <option th:selected="${selectedStatus != null and selectedStatus == '1'}" value="1" th:text="#{status.active}">Active</option>
                        <option th:selected="${selectedStatus != null and selectedStatus == '0'}" value="0" th:text="#{status.disabled}">Disabled</option>
                    </select>
                </div>
            </div>
        </th:block>
        <th:block id="menu-headers">
            <th th:text="#{rbac.menus.code}">Code</th>
            <th th:text="#{rbac.menus.name}">Name</th>
            <th th:text="#{rbac.menus.type}">Type</th>
            <th th:text="#{rbac.menus.path}">Path</th>
            <th th:text="#{rbac.menus.permission}">Permission</th>
            <th th:text="#{rbac.menus.sort}">Sort</th>
            <th th:text="#{rbac.menus.status}">Status</th>
            <th th:text="#{rbac.menus.actions}">Actions</th>
        </th:block>
        <th:block id="menu-row">
            <td><code th:text="${item.code}">user:list</code></td>
            <td th:text="${item.name}">Users</td>
            <td>
                <span class="badge bg-info text-dark" th:if="${item.type == 1}"
                      th:text="#{rbac.menus.badge.menu}">Menu</span>
                <span class="badge bg-warning text-dark" th:if="${item.type == 2}" th:text="#{rbac.menus.badge.button}">Button</span>
                <span class="badge badge-purple" th:if="${item.type == 3}" th:text="#{rbac.menus.badge.api}">API</span>
            </td>
            <td th:text="${item.path}">/admin/rbac/users</td>
            <td><code th:text="${item.permission}">user:list</code></td>
            <td th:text="${item.sort}">1</td>
            <td>
                <span class="badge bg-success" th:if="${item.status == 1}" th:text="#{status.active}">Active</span>
                <span class="badge bg-danger" th:if="${item.status == 0}" th:text="#{status.disabled}">Disabled</span>
            </td>
            <td>
                <button class="btn btn-outline-primary btn-sm"
                        data-modal="menu-modal" th:attr="data-edit-id=${item.id}"
                        th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:menu:update')}"
                        th:text="#{action.edit}">Edit
                </button>
            </td>
        </th:block>
    </th:block>

    <script th:inline="javascript">
    (function () {
        var searchInput = document.getElementById('menuSearchInput');
        var typeFilter = document.getElementById('menuTypeFilter');
        var statusFilter = document.getElementById('menuStatusFilter');
        var clearBtn = document.getElementById('menuSearchClear');
        var DEBOUNCE_MS = 400;
        var searchTimer = null;

        function doSearch() {
            var keyword = searchInput ? searchInput.value.trim() : '';
            var type = typeFilter ? typeFilter.value : '';
            var status = statusFilter ? statusFilter.value : '';
            var params = new URLSearchParams(window.location.search);
            if (keyword) params.set('keyword', keyword);
            else params.delete('keyword');
            if (type) params.set('type', type);
            else params.delete('type');
            if (status) params.set('status', status);
            else params.delete('status');
            params.delete('page');
            window.location.href = '/admin/rbac/menus?' + params.toString();
        }

        function updateClearBtn() {
            if (clearBtn) {
                clearBtn.style.display = searchInput.value ? '' : 'none';
            }
        }

        if (searchInput) {
            updateClearBtn();
            searchInput.addEventListener('input', function () {
                updateClearBtn();
                clearTimeout(searchTimer);
                searchTimer = setTimeout(doSearch, DEBOUNCE_MS);
            });
            searchInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    clearTimeout(searchTimer);
                    doSearch();
                }
            });
        }

        if (clearBtn) {
            clearBtn.addEventListener('click', function () {
                searchInput.value = '';
                updateClearBtn();
                clearTimeout(searchTimer);
                doSearch();
            });
        }

        if (typeFilter) {
            typeFilter.addEventListener('change', function () {
                clearTimeout(searchTimer);
                doSearch();
            });
        }

        if (statusFilter) {
            statusFilter.addEventListener('change', function () {
                clearTimeout(searchTimer);
                doSearch();
            });
        }
    })();
</script>

<!-- Menu Modal -->
    <div class="modal fade" id="menu-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{rbac.menus.create}">Create Menu</h5>
                    <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <form class="dict-modal-form" data-api-base="/api/rbac/menus">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label" for="menu-parentId" th:text="#{rbac.menus.parent_id}">Parent
                                ID</label>
                            <input class="form-control" id="menu-parentId" name="parentId" type="number">
                            <div class="invalid-feedback" data-field="parentId"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="menu-code" th:text="#{rbac.menus.code}">Code</label>
                            <input class="form-control" id="menu-code" name="code" required type="text">
                            <div class="invalid-feedback" data-field="code"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="menu-name" th:text="#{rbac.menus.name}">Name</label>
                            <input class="form-control" id="menu-name" name="name" required type="text">
                            <div class="invalid-feedback" data-field="name"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="menu-type" th:text="#{rbac.menus.type}">Type</label>
                            <select class="form-select" id="menu-type" name="type">
                                <option th:text="#{rbac.menus.type.directory}" value="1">Directory</option>
                                <option th:text="#{rbac.menus.type.menu}" value="2">Menu</option>
                                <option th:text="#{rbac.menus.type.button}" value="3">Button</option>
                            </select>
                            <div class="invalid-feedback" data-field="type"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="menu-path" th:text="#{rbac.menus.path}">Path</label>
                            <input class="form-control" id="menu-path" name="path" type="text">
                            <div class="invalid-feedback" data-field="path"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="menu-component"
                                   th:text="#{rbac.menus.component}">Component</label>
                            <input class="form-control" id="menu-component" name="component" type="text">
                            <div class="invalid-feedback" data-field="component"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="menu-permission" th:text="#{rbac.menus.permission}">Permission</label>
                            <input class="form-control" id="menu-permission" name="permission" type="text">
                            <div class="invalid-feedback" data-field="permission"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="menu-icon" th:text="#{rbac.menus.icon}">Icon</label>
                            <input class="form-control" id="menu-icon" name="icon" type="text">
                            <div class="invalid-feedback" data-field="icon"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="menu-sort" th:text="#{rbac.menus.sort}">Sort</label>
                            <input class="form-control" id="menu-sort" name="sort" type="number">
                            <div class="invalid-feedback" data-field="sort"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="menu-visible" th:text="#{rbac.menus.visible}">Visible</label>
                            <select class="form-select" id="menu-visible" name="visible">
                                <option th:text="#{rbac.menus.visible.visible}" value="1">Visible</option>
                                <option th:text="#{rbac.menus.visible.hidden}" value="0">Hidden</option>
                            </select>
                            <div class="invalid-feedback" data-field="visible"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="menu-status" th:text="#{rbac.menus.status}">Status</label>
                            <select class="form-select" id="menu-status" name="status">
                                <option th:text="#{status.active}" value="1">Active</option>
                                <option th:text="#{status.disabled}" value="0">Disabled</option>
                            </select>
                            <div class="invalid-feedback" data-field="status"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{action.cancel}"
                                type="button">Cancel
                        </button>
                        <button class="btn btn-primary modal-submit" th:text="#{action.save}" type="button">Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
