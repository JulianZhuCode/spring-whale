<!DOCTYPE html>
<html layout:decorate="~{admin/layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="#{rbac.users.title}">Users</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title=#{rbac.users.title},
        description=#{rbac.users.description},
        createUrl='#',
        createModal='user-modal',
        createPermission='rbac:user:create',
        items=${users},
        emptyMessage=#{rbac.users.empty},
        baseUrl='/admin/rbac/users',
        page=${page},
        colspan=8,
        headers=~{::#user-headers},
        rows=~{::#user-row}
    )}">
        <th:block id="user-headers">
            <th>ID</th>
            <th th:text="#{rbac.users.username}">Username</th>
            <th th:text="#{rbac.users.real_name}">Real Name</th>
            <th th:text="#{rbac.users.email}">Email</th>
            <th th:text="#{rbac.users.phone}">Phone</th>
            <th th:text="#{rbac.users.group}">Group</th>
            <th th:text="#{rbac.users.status}">Status</th>
            <th th:text="#{rbac.users.actions}">Actions</th>
        </th:block>
        <th:block id="user-row">
            <td th:text="${item.id}">1</td>
            <td th:text="${item.username}">admin</td>
            <td th:text="${item.realName}">Admin</td>
            <td th:text="${item.email}">admin@example.com</td>
            <td th:text="${item.phone}">13800138000</td>
            <td th:text="${item.groupName} ?: '-'">Root Group</td>
            <td>
                <span class="badge bg-success" th:if="${item.status == 1}" th:text="#{status.active}">Active</span>
                <span class="badge bg-danger" th:if="${item.status == 0}" th:text="#{status.disabled}">Disabled</span>
            </td>
            <td>
                <button class="btn btn-outline-primary btn-sm"
                        data-modal="user-modal" th:attr="data-edit-id=${item.id}"
                        th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:user:update')}"
                        th:text="#{action.edit}">Edit
                </button>
            </td>
        </th:block>
    </th:block>

    <!-- User Modal -->
    <div class="modal fade" id="user-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{rbac.users.create}">Create User</h5>
                    <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <form class="dict-modal-form" data-api-base="/api/rbac/users">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label" for="user-username"
                                   th:text="#{rbac.users.username}">Username</label>
                            <input class="form-control" id="user-username" name="username" required type="text">
                            <div class="invalid-feedback" data-field="username"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-password"
                                   th:text="#{rbac.users.password}">Password</label>
                            <input class="form-control" id="user-password" name="password" type="password">
                            <div class="invalid-feedback" data-field="password"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-realName" th:text="#{rbac.users.real_name}">Real
                                Name</label>
                            <input class="form-control" id="user-realName" name="realName" type="text">
                            <div class="invalid-feedback" data-field="realName"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-email" th:text="#{rbac.users.email}">Email</label>
                            <input class="form-control" id="user-email" name="email" type="email">
                            <div class="invalid-feedback" data-field="email"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-phone" th:text="#{rbac.users.phone}">Phone</label>
                            <input class="form-control" id="user-phone" name="phone" type="text">
                            <div class="invalid-feedback" data-field="phone"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-groupId" th:text="#{rbac.users.group}">Group</label>
                            <select class="form-select" id="user-groupId" name="groupId">
                                <option th:text="#{rbac.users.select_group}" value="">-- Select --</option>
                            </select>
                            <div class="invalid-feedback" data-field="groupId"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-status" th:text="#{rbac.users.status}">Status</label>
                            <select class="form-select" id="user-status" name="status">
                                <option th:text="#{status.active}" value="1">Active</option>
                                <option th:text="#{status.disabled}" value="0">Disabled</option>
                            </select>
                            <div class="invalid-feedback" data-field="status"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{action.cancel}"
                                type="button">Cancel
                        </button>
                        <button class="btn btn-primary modal-submit" th:text="#{action.save}" type="button">Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
