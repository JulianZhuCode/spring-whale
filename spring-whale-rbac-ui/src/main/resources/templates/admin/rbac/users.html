<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title th:text="#{rbac.users.title}">Users</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title=#{rbac.users.title},
        description=#{rbac.users.description},
        createUrl='#',
        createModal='user-modal',
        createPermission='rbac:user:create',
        items=${users},
        emptyMessage=#{rbac.users.empty},
        baseUrl='/admin/rbac/users',
        page=${page},
        colspan=8,
        headers=~{::#user-headers},
        rows=~{::#user-row}
    )}">
        <th:block id="user-headers">
            <th>ID</th>
            <th th:text="#{rbac.users.username}">Username</th>
            <th th:text="#{rbac.users.real_name}">Real Name</th>
            <th th:text="#{rbac.users.email}">Email</th>
            <th th:text="#{rbac.users.phone}">Phone</th>
            <th th:text="#{rbac.users.group}">Group</th>
            <th th:text="#{rbac.users.status}">Status</th>
            <th th:text="#{rbac.users.actions}">Actions</th>
        </th:block>
        <th:block id="user-row">
            <td th:text="${item.id}">1</td>
            <td th:text="${item.username}">admin</td>
            <td th:text="${item.realName}">Admin</td>
            <td th:text="${item.email}">admin@example.com</td>
            <td th:text="${item.phone}">13800138000</td>
            <td th:text="${item.groupName} ?: '-'">Root Group</td>
            <td>
                <span th:if="${item.status == 1}" class="badge bg-success" th:text="#{status.active}">Active</span>
                <span th:if="${item.status == 0}" class="badge bg-danger" th:text="#{status.disabled}">Disabled</span>
            </td>
            <td>
                <button th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:user:update')}"
                        data-modal="user-modal" th:attr="data-edit-id=${item.id}" class="btn btn-outline-primary btn-sm" th:text="#{action.edit}">Edit</button>
            </td>
        </th:block>
    </th:block>

    <!-- User Modal -->
    <div class="modal fade" id="user-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{rbac.users.create}">Create User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form class="dict-modal-form" data-api-base="/api/rbac/users">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label" for="user-username" th:text="#{rbac.users.username}">Username</label>
                            <input type="text" id="user-username" name="username" class="form-control" required>
                            <div class="invalid-feedback" data-field="username"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-password" th:text="#{rbac.users.password}">Password</label>
                            <input type="password" id="user-password" name="password" class="form-control">
                            <div class="invalid-feedback" data-field="password"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-realName" th:text="#{rbac.users.real_name}">Real Name</label>
                            <input type="text" id="user-realName" name="realName" class="form-control">
                            <div class="invalid-feedback" data-field="realName"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-email" th:text="#{rbac.users.email}">Email</label>
                            <input type="email" id="user-email" name="email" class="form-control">
                            <div class="invalid-feedback" data-field="email"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-phone" th:text="#{rbac.users.phone}">Phone</label>
                            <input type="text" id="user-phone" name="phone" class="form-control">
                            <div class="invalid-feedback" data-field="phone"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-groupId" th:text="#{rbac.users.group}">Group</label>
                            <select id="user-groupId" name="groupId" class="form-select">
                                <option value="" th:text="#{rbac.users.select_group}">-- Select --</option>
                            </select>
                            <div class="invalid-feedback" data-field="groupId"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="user-status" th:text="#{rbac.users.status}">Status</label>
                            <select id="user-status" name="status" class="form-select">
                                <option value="1" th:text="#{status.active}">Active</option>
                                <option value="0" th:text="#{status.disabled}">Disabled</option>
                            </select>
                            <div class="invalid-feedback" data-field="status"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{action.cancel}">Cancel</button>
                        <button type="button" class="btn btn-primary modal-submit" th:text="#{action.save}">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
