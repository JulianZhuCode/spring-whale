<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title th:text="#{rbac.groups.title}">Groups</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title=#{rbac.groups.title},
        description=#{rbac.groups.description},
        createUrl='#',
        createModal='group-modal',
        createPermission='rbac:group:create',
        items=${groups},
        emptyMessage=#{rbac.groups.empty},
        baseUrl='/admin/rbac/groups',
        page=${page},
        colspan=8,
        headers=~{::#group-headers},
        rows=~{::#group-row}
    )}">
        <th:block id="group-headers">
            <th>ID</th>
            <th th:text="#{rbac.groups.code}">Code</th>
            <th th:text="#{rbac.groups.name}">Name</th>
            <th th:text="#{rbac.groups.description}">Description</th>
            <th th:text="#{rbac.groups.leader}">Leader</th>
            <th th:text="#{rbac.groups.sort}">Sort</th>
            <th th:text="#{rbac.groups.status}">Status</th>
            <th th:text="#{rbac.groups.actions}">Actions</th>
        </th:block>
        <th:block id="group-row">
            <td th:text="${item.id}">1</td>
            <td><code th:text="${item.code}">IT</code></td>
            <td th:text="${item.name}">IT Dept</td>
            <td th:text="${item.description}">IT Department</td>
            <td th:text="${item.leader}">John</td>
            <td th:text="${item.sort}">1</td>
            <td>
                <span th:if="${item.status == 1}" class="badge bg-success" th:text="#{status.active}">Active</span>
                <span th:if="${item.status == 0}" class="badge bg-danger" th:text="#{status.disabled}">Disabled</span>
            </td>
            <td>
                <button th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:group:update')}"
                        data-modal="group-modal" th:attr="data-edit-id=${item.id}" class="btn btn-outline-primary btn-sm" th:text="#{action.edit}">Edit</button>
            </td>
        </th:block>
    </th:block>

    <!-- Group Modal -->
    <div class="modal fade" id="group-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{rbac.groups.create}">Create Group</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form class="dict-modal-form" data-api-base="/api/rbac/groups">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label" for="group-parentId" th:text="#{rbac.groups.parent_id}">Parent ID</label>
                            <input type="number" id="group-parentId" name="parentId" class="form-control">
                            <div class="invalid-feedback" data-field="parentId"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-code" th:text="#{rbac.groups.code}">Code</label>
                            <input type="text" id="group-code" name="code" class="form-control" required>
                            <div class="invalid-feedback" data-field="code"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-name" th:text="#{rbac.groups.name}">Name</label>
                            <input type="text" id="group-name" name="name" class="form-control" required>
                            <div class="invalid-feedback" data-field="name"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-description" th:text="#{rbac.groups.description}">Description</label>
                            <input type="text" id="group-description" name="description" class="form-control">
                            <div class="invalid-feedback" data-field="description"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-leader" th:text="#{rbac.groups.leader}">Leader</label>
                            <input type="text" id="group-leader" name="leader" class="form-control">
                            <div class="invalid-feedback" data-field="leader"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-phone" th:text="#{rbac.groups.phone}">Phone</label>
                            <input type="text" id="group-phone" name="phone" class="form-control">
                            <div class="invalid-feedback" data-field="phone"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-email" th:text="#{rbac.groups.email}">Email</label>
                            <input type="email" id="group-email" name="email" class="form-control">
                            <div class="invalid-feedback" data-field="email"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-sort" th:text="#{rbac.groups.sort}">Sort</label>
                            <input type="number" id="group-sort" name="sort" class="form-control">
                            <div class="invalid-feedback" data-field="sort"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-status" th:text="#{rbac.groups.status}">Status</label>
                            <select id="group-status" name="status" class="form-select">
                                <option value="1" th:text="#{status.active}">Active</option>
                                <option value="0" th:text="#{status.disabled}">Disabled</option>
                            </select>
                            <div class="invalid-feedback" data-field="status"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{action.cancel}">Cancel</button>
                        <button type="button" class="btn btn-primary modal-submit" th:text="#{action.save}">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
