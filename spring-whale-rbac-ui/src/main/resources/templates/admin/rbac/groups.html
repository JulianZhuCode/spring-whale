<!DOCTYPE html>
<html layout:decorate="~{admin/layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="#{rbac.groups.title}">Groups</title>
</head>

<body>

<main layout:fragment="content">
    <th:block th:replace="~{admin/fragments/data-table :: table(
        title=#{rbac.groups.title},
        description=#{rbac.groups.description},
        createUrl='#',
        createModal='group-modal',
        createPermission='rbac:group:create',
        items=${groups},
        emptyMessage=#{rbac.groups.empty},
        baseUrl='/admin/rbac/groups',
        page=${page},
        colspan=7,
        headers=~{::#group-headers},
        rows=~{::#group-row},
        filter=~{::#group-filter}
    )}">
        <th:block id="group-filter">
            <div class="row g-2">
                <div class="col-md-5">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input class="form-control" id="groupSearchInput"
                               th:placeholder="#{rbac.groups.search_placeholder}"
                               th:value="${keyword}" type="text">
                        <button class="btn btn-outline-secondary" id="groupSearchClear" style="display:none"
                                type="button">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="groupStatusFilter">
                        <option value="" th:text="#{rbac.groups.all_status}">All Status</option>
                        <option th:selected="${selectedStatus != null and selectedStatus == '1'}" value="1" th:text="#{status.active}">Active</option>
                        <option th:selected="${selectedStatus != null and selectedStatus == '0'}" value="0" th:text="#{status.disabled}">Disabled</option>
                    </select>
                </div>
            </div>
        </th:block>
        <th:block id="group-headers">
            <th th:text="#{rbac.groups.code}">Code</th>
            <th th:text="#{rbac.groups.name}">Name</th>
            <th th:text="#{rbac.groups.description}">Description</th>
            <th th:text="#{rbac.groups.leader}">Leader</th>
            <th th:text="#{rbac.groups.sort}">Sort</th>
            <th th:text="#{rbac.groups.status}">Status</th>
            <th th:text="#{rbac.groups.actions}">Actions</th>
        </th:block>
        <th:block id="group-row">
            <td><code th:text="${item.code}">IT</code></td>
            <td th:text="${item.name}">IT Dept</td>
            <td th:text="${item.description}">IT Department</td>
            <td th:text="${item.leader}">John</td>
            <td th:text="${item.sort}">1</td>
            <td>
                <span class="badge bg-success" th:if="${item.status == 1}" th:text="#{status.active}">Active</span>
                <span class="badge bg-danger" th:if="${item.status == 0}" th:text="#{status.disabled}">Disabled</span>
            </td>
            <td>
                <button class="btn btn-outline-primary btn-sm"
                        data-modal="group-modal" th:attr="data-edit-id=${item.id}"
                        th:if="${#sets.contains(userAuthorities, '*') or #sets.contains(userAuthorities, 'rbac:group:update')}"
                        th:text="#{action.edit}">Edit
                </button>
            </td>
        </th:block>
    </th:block>

    <script th:inline="javascript">
    (function () {
        var searchInput = document.getElementById('groupSearchInput');
        var statusFilter = document.getElementById('groupStatusFilter');
        var clearBtn = document.getElementById('groupSearchClear');
        var DEBOUNCE_MS = 400;
        var searchTimer = null;

        function doSearch() {
            var keyword = searchInput ? searchInput.value.trim() : '';
            var status = statusFilter ? statusFilter.value : '';
            var params = new URLSearchParams(window.location.search);
            if (keyword) params.set('keyword', keyword);
            else params.delete('keyword');
            if (status) params.set('status', status);
            else params.delete('status');
            params.delete('page');
            window.location.href = '/admin/rbac/groups?' + params.toString();
        }

        function updateClearBtn() {
            if (clearBtn) {
                clearBtn.style.display = searchInput.value ? '' : 'none';
            }
        }

        if (searchInput) {
            updateClearBtn();
            searchInput.addEventListener('input', function () {
                updateClearBtn();
                clearTimeout(searchTimer);
                searchTimer = setTimeout(doSearch, DEBOUNCE_MS);
            });
            searchInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    clearTimeout(searchTimer);
                    doSearch();
                }
            });
        }

        if (clearBtn) {
            clearBtn.addEventListener('click', function () {
                searchInput.value = '';
                updateClearBtn();
                clearTimeout(searchTimer);
                doSearch();
            });
        }

        if (statusFilter) {
            statusFilter.addEventListener('change', function () {
                clearTimeout(searchTimer);
                doSearch();
            });
        }
    })();
</script>

<!-- Group Modal -->
    <div class="modal fade" id="group-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{rbac.groups.create}">Create Group</h5>
                    <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <form class="dict-modal-form" data-api-base="/api/rbac/groups">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label" for="group-parentId" th:text="#{rbac.groups.parent_id}">Parent
                                ID</label>
                            <input class="form-control" id="group-parentId" name="parentId" type="number">
                            <div class="invalid-feedback" data-field="parentId"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-code" th:text="#{rbac.groups.code}">Code</label>
                            <input class="form-control" id="group-code" name="code" required type="text">
                            <div class="invalid-feedback" data-field="code"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-name" th:text="#{rbac.groups.name}">Name</label>
                            <input class="form-control" id="group-name" name="name" required type="text">
                            <div class="invalid-feedback" data-field="name"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-description" th:text="#{rbac.groups.description}">Description</label>
                            <input class="form-control" id="group-description" name="description" type="text">
                            <div class="invalid-feedback" data-field="description"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-leader" th:text="#{rbac.groups.leader}">Leader</label>
                            <input class="form-control" id="group-leader" name="leader" type="text">
                            <div class="invalid-feedback" data-field="leader"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-phone" th:text="#{rbac.groups.phone}">Phone</label>
                            <input class="form-control" id="group-phone" name="phone" type="text">
                            <div class="invalid-feedback" data-field="phone"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-email" th:text="#{rbac.groups.email}">Email</label>
                            <input class="form-control" id="group-email" name="email" type="email">
                            <div class="invalid-feedback" data-field="email"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-sort" th:text="#{rbac.groups.sort}">Sort</label>
                            <input class="form-control" id="group-sort" name="sort" type="number">
                            <div class="invalid-feedback" data-field="sort"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="group-status" th:text="#{rbac.groups.status}">Status</label>
                            <select class="form-select" id="group-status" name="status">
                                <option th:text="#{status.active}" value="1">Active</option>
                                <option th:text="#{status.disabled}" value="0">Disabled</option>
                            </select>
                            <div class="invalid-feedback" data-field="status"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{action.cancel}"
                                type="button">Cancel
                        </button>
                        <button class="btn btn-primary modal-submit" th:text="#{action.save}" type="button">Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
